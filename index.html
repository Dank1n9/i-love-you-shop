<!-- 实时时钟插件样式 + 右上角紧凑布局重写 -->
<style>
  /* 基础时钟卡片样式 (用于右上角紧凑版) */
  .clock-plugin-corner {
    background: rgba(15, 25, 45, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 2rem;
    border: 1px solid rgba(72, 187, 255, 0.4);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), 0 0 0 0.5px rgba(72, 187, 255, 0.2) inset;
    padding: 0.5rem 1rem;
    transition: all 0.2s ease;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
    min-width: 240px;
  }
  .clock-plugin-corner:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 212, 255, 0.6);
    box-shadow: 0 12px 25px rgba(0,0,0,0.25);
  }
  /* 右上角内部布局：上下分层，但紧凑 */
  .corner-date {
    font-size: 0.7rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    color: #ccf0ff;
    border-bottom: 1px dashed rgba(100, 180, 250, 0.4);
    padding-bottom: 4px;
    margin-bottom: 6px;
  }
  .corner-full-date {
    font-weight: 500;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.05);
    padding: 0 6px;
    border-radius: 20px;
  }
  .corner-weekday {
    background: linear-gradient(145deg, #2c4c7c, #123256);
    padding: 0 8px;
    border-radius: 30px;
    font-size: 0.65rem;
    color: #c4e2ff;
  }
  .corner-time {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    margin: 6px 0 4px;
  }
  .corner-hour-minute {
    font-size: 1.7rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #FFFFFF, #b0e0ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: 2px;
  }
  .corner-separator {
    font-size: 1.7rem;
    font-weight: 600;
    color: #4eb5ff;
    animation: softPulse 1.2s infinite ease;
    line-height: 1;
  }
  .corner-seconds {
    font-size: 1rem;
    font-weight: 500;
    background: linear-gradient(145deg, #cceeff, #6db3ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-left: 2px;
  }
  .corner-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: #bbd9ff;
    margin-top: 5px;
    border-top: 1px solid rgba(72, 187, 255, 0.3);
    padding-top: 5px;
  }
  .corner-timezone {
    background: rgba(0, 0, 0, 0.4);
    padding: 2px 8px;
    border-radius: 20px;
    font-family: monospace;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .live-dot-small {
    display: inline-block;
    width: 8px;
    height: 8px;
    background-color: #2effb0;
    border-radius: 50%;
    box-shadow: 0 0 6px #00ffaa;
    animation: blinkLive 1.2s infinite;
    margin-right: 4px;
  }
  @keyframes softPulse {
    0% { opacity: 0.7; text-shadow: 0 0 2px #0080ff;}
    100% { opacity: 1; text-shadow: 0 0 8px #4aaeff;}
  }
  @keyframes blinkLive {
    0% { opacity: 0.3; transform: scale(0.8);}
    100% { opacity: 1; transform: scale(1.1);}
  }

  /* 调整 header 布局: 让 logo 在左, nav 和 时钟在右 */
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.5rem;
    background: inherit; /* 保持原背景, 不破坏原有设计 */
  }
  #logo {
    flex-shrink: 0;
  }
  nav {
    display: flex;
    gap: 1.2rem;
    margin-left: auto;
    margin-right: 1.5rem;
  }
  .corner-clock-container {
    flex-shrink: 0;
  }
  /* 响应式: 屏幕过小时时钟换行 */
  @media (max-width: 780px) {
    header {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }
    nav {
      margin-left: 0;
      justify-content: center;
    }
    .corner-clock-container {
      align-self: flex-end;
    }
  }
  @media (max-width: 550px) {
    .clock-plugin-corner {
      min-width: 200px;
      padding: 0.4rem 0.8rem;
    }
    .corner-hour-minute {
      font-size: 1.3rem;
    }
    .corner-separator {
      font-size: 1.3rem;
    }
    .corner-seconds {
      font-size: 0.85rem;
    }
  }
</style>

<!-- 实时时钟脚本 (紧凑右上角版，每秒更新) -->
<script>
(function() {
    // 获取右上角时钟各元素
    const cornerDateElem = document.getElementById('cornerDate');
    const cornerWeekdayElem = document.getElementById('cornerWeekday');
    const cornerHourMinuteElem = document.getElementById('cornerHourMinute');
    const cornerSecondsElem = document.getElementById('cornerSeconds');
    const cornerTimezoneElem = document.getElementById('cornerTimezone');

    // 辅助函数
    function padZero(num) {
        return num < 10 ? '0' + num : String(num);
    }

    const weekdaysCN = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

    function getFormattedDate(date) {
        const year = date.getFullYear();
        const month = padZero(date.getMonth() + 1);
        const day = padZero(date.getDate());
        return `${year}/${month}/${day}`;
    }

    function getWeekday(date) {
        return weekdaysCN[date.getDay()];
    }

    function getHourMinute(date) {
        return `${padZero(date.getHours())}:${padZero(date.getMinutes())}`;
    }

    function getSeconds(date) {
        return padZero(date.getSeconds());
    }

    function getLocalTimeZoneShort() {
        try {
            const timeZoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
            if (timeZoneName) {
                const offset = -new Date().getTimezoneOffset() / 60;
                const sign = offset >= 0 ? '+' : '';
                let offsetStr = `UTC${sign}${Math.abs(offset)}`;
                if (offset % 1 !== 0) {
                    const hours = Math.floor(Math.abs(offset));
                    const mins = Math.abs((offset % 1) * 60);
                    offsetStr = `UTC${sign}${hours}:${padZero(mins)}`;
                }
                let shortZone = timeZoneName.split('/').pop().replace(/_/g, ' ');
                if (shortZone === 'Shanghai' || shortZone === 'Beijing') shortZone = '中国';
                return `${shortZone} ${offsetStr}`;
            } else {
                const offset = -new Date().getTimezoneOffset();
                const hours = Math.floor(Math.abs(offset) / 60);
                const mins = Math.abs(offset) % 60;
                const sign = offset >= 0 ? '+' : '-';
                return `本地 UTC${sign}${padZero(hours)}:${padZero(mins)}`;
            }
        } catch(e) {
            return "本地时区";
        }
    }

    // 更新右上角时钟
    function updateCornerClock() {
        const now = new Date();
        if (cornerDateElem) cornerDateElem.textContent = getFormattedDate(now);
        if (cornerWeekdayElem) cornerWeekdayElem.textContent = getWeekday(now);
        if (cornerHourMinuteElem) cornerHourMinuteElem.textContent = getHourMinute(now);
        if (cornerSecondsElem) cornerSecondsElem.textContent = getSeconds(now);
    }

    // 设置时区 (只需一次)
    if (cornerTimezoneElem) {
        cornerTimezoneElem.innerHTML = `🌐 ${getLocalTimeZoneShort()}`;
    }

    // 立即更新
    updateCornerClock();
    // 每秒刷新
    let intervalId = setInterval(updateCornerClock, 1000);

    // 页面关闭时清理定时器
    window.addEventListener('beforeunload', function() {
        if (intervalId) clearInterval(intervalId);
    });
})();
</script>
